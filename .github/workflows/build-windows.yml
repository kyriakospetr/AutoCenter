name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Εγκατάσταση pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Εγκατάσταση Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Εγκατάσταση Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # --- Η ΝΕΑ ΠΡΟΣΘΗΚΗ ΠΟΥ ΛΥΝΕΙ ΤΟ ΠΡΟΒΛΗΜΑ ΟΡΙΣΤΙΚΑ ---
      - name: Εγκατάσταση SQLite μέσω vcpkg
        run: |
          vcpkg install sqlite3:x64-windows
          echo "SQLITE3_LIB_DIR=C:\vcpkg\installed\x64-windows\lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=C:\vcpkg\installed\x64-windows\include" >> $GITHUB_ENV
        shell: pwsh
      # -----------------------------------------------------

      - name: Εγκατάσταση frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (Windows)
        env:
          CI: false 
        run: pnpm tauri build

      - name: Ανέβασμα installer ως artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error