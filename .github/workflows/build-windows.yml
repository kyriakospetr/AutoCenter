name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout κώδικα
        uses: actions/checkout@v4

      - name: Εγκατάσταση pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Εγκατάσταση Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm' # Ενεργοποίηση cache για το pnpm

      - name: Εγκατάσταση Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc # Ορίζουμε ρητά το target των Windows

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Εγκατάσταση frontend dependencies
        run: pnpm install --frozen-lockfile # Πιο ασφαλές για CI

      - name: Build Tauri app (Windows)
        # Το CI=false εμποδίζει το Tauri από το να κολλήσει περιμένοντας user input
        env:
          CI: false 
        run: pnpm tauri build

      - name: Ανέβασμα installer ως artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error # Θα μας δείξει αμέσως αν τα αρχεία φτιάχτηκαν